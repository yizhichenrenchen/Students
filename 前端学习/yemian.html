<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- 注释 -->
 <h1>一级标题</h1>
 <p>一段内容</p><br><p>另外一段内容</p>
 <hr>
 <strong>加粗</strong><br>
 <em>倾斜</em><br>
 <ins>下划线</ins><br>
 <del>删除线</del><br>
 <!-- img标签及属性 -->
 <img src="./img/0.png" width="500"><br>
 <img src="./img/python库1.jpg" alt="稍后查看" title="python标准库" width="500"><br>
 <img src="../Students/img/sql1.png" alt="sql语句" width="500"><br>
 <img src="F:\手机备份\相机\IMG_20250504_201407(动态图)\IMG_20250504_201407.jpg" alt="吃火锅" title="吃火锅" width="500">
 <!-- href超链接标签 -->
 <a href="http://4a.chinatowercom.cn:20000/uac/login" target="_blank">跳转登录4a</a><br>
<!-- target属性定义在打开新页面时的方法，例如新页面打开和覆盖原页面打开 -->
 <a href="#">开发初期，可以#占位</a><br>
 <!-- 音频标签及属性 -->
 <p>巴黎夜雨-艾辰</p>
 <audio src="./music/艾辰 - 巴黎夜雨 - 副本.mp3" controls autoplay loop></audio><br>
 <!-- loop属性循环播放，autoplay自动播放，但是一般浏览器自动禁用，controls属性可以加上音频控制面板 -->
  <!-- 视频标签及属性 -->
  <p>抖音视频</p><br>
 <video src="./vedio/1732358079.mp4" controls muted autoplay></video><br>
 <p>童话镇视频</p><br>
 <video src="./vedio/童话镇.mp4" controls></video>
 <!-- video属性中controls是控制面板，muted静音播放，autoplay自动播放，但是一般浏览器自动禁止，可以配合静音播放属性完成自动播放，loop循环播放 -->
<!-- 列表标签，无序列表ul,ul标签嵌套li标签 -->
 <ul>
   <li>1. 列表项1</li>
   <li>2. 列表项2</li>
   <li>3. 列表项3</li>
 </ul>
 <!-- 有序列表ol,ol标签嵌套li标签 -->
 <ol>
   <li>1. 有序列表项1</li>
   <li>2. 有序列表项2</li>
   <li>3. 有序列表项3</li>
 </ol>
 <!-- 定义列表dl嵌套dt和dd标签，dt定义标题，dd定义描述 -->
 <dl>
   <dt>标题1</dt>
   <dd>描述1</dd>
   <dt>标题2</dt>
   <dd>描述2</dd>
 </dl>
 <!-- 表格标签，table嵌套tr，tr嵌套td，th标签，tr表示行，th表示表头，td表示单元格，以及结构标签thead表头，tbody内容，tfoot总结 -->
<!-- 表格也可以进行合并单元格，跨行合并属性rowspan，跨列合并属性colspan，原则保留最左最上单元格，添加属性，删除其他单元格，不能跨结构标签合并 -->
  <table border="1">
    <thead>
        <tr>
        <th>姓名</th>
        <th>语文</th>
        <th>数学</th>
        <th>总分</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>张三</td>
            <td>99</td>
            <td rowspan="2">100</td>
            <td>199</td>
        </tr>

        <tr>
            <td>李四</td>
            <td>98</td>

            <td>198</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td>总结</td>
            <td colspan="3">全市第一</td>

        </tr>
    </tfoot>
</body>
</html>
