<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>布局标签,字符实体</title>
</head>
<body>
    <!-- div标签和span标签，div标签不换行，大盒子，span标签换行，小盒子 -->
     <div>div大盒子</div>
     <div>div大盒子换行</div>
     <span>span小盒子</span>
     <span>span小盒子不换行</span><br>
     ------------------------------------------------------------------------------
     <br>
     <!-- 字符实体,用来显示某些符号,例如左尖括号&lt,右尖括号&gt,空格&nbsp -->
      <p>&lt;p&gt;&nbsp;&lt;p&gt;</p>


</body>
</html>
