<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>按钮</title>
</head>
<body>
    <!-- 标签button来标记按钮，同input标签一样，也是使用type属性来控制button的功能，有三个属性值
     submit属性值可以实现提交，reset可以实现重置，button默认无功能，配合js使用 -->
     <!-- 注意应该由form标签来管理整个表单区域，这样在使用某些功能时才可以时整个表单区域生效，例如reset -->
     <form action="">
        账号<input type="text"><br>
        密码<input type="password"><br>
        <button type="submit">提交</button>
        <button type="reset">重置</button>
        <button type="button">普通标签</button>
     </form>
</body>
</html>
