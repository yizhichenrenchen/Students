<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id选择器</title>
    <!-- 一般配合js使用 -->
    <style>
        #red {color: red;}
        #blue {color: blue;}
        #size {font-size: 60px;}
    </style>
</head>
<body>
    <p id="red">This is a red paragraph.</p>
    <p id="blue">This is a blue paragraph.</p>
    <p id="size">This is a large paragraph.</p>

</body>
</html>
