<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>类选择器</title>
    <!-- style标签中定义类选择器,并设置相应的样式 -->
    <style>
        .red {color: red;}
        .blue {color: blue;}
        .size {font-size: 60px;}
    </style>
</head>
<body>
    <!-- 在HTML中使用类选择器,并设置相应的class属性 -->
     <!-- 注意一个标签不能使用两个class属性，但是class可以有多个属性值 -->
    <p class="red">这是一个红色的段落</p>
    <p class="blue size">这是一个蓝色的段落</p>

</body>
</html>
