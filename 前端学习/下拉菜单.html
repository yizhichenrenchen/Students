<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下拉菜单</title>
</head>
<body>
    <!-- 使用select标签嵌套option标签来实现下拉菜单，可以使用selected属性实现默认选择 -->
     <select>
        <option>上海</option>
        <option>北京</option>
        <option selected>武汉</option>
        <option>深圳</option>
     </select>
</body>
</html>
