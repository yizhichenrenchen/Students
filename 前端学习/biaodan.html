<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form表单</title>
</head>
<body>
    <!-- input标签及其属性type，当type属性值不同时，input功能是不同
     的，属性值为text时，文本框，输入单行文本，password时密码框，redio单选框，
     checkbox多选框，file上传文件，placeholder属性可以添加占位字符 -->
     文本框:<input type="text" placeholder="手机号/邮箱/身份证"><br>
     密  码:<input type="password" placeholder="密码"><br>
     <!-- 单选框属性name箱单与定义一个类，然后每类只能选择一个，例如下面，男和女类一样只能选一个，然后可以通过checked属性来实现默认选择-->
      <!-- lable标签可以实现选择时增加选择面积，例如原先需要精准点在小圆圈里面，加入lable标签可以实现点击男或者女也可以选择上，使用
       方法如下，以下两种写法皆可实现，也可以实现需要点击的东西增大范围 -->
     单选:<input type="radio" name="gender" id="man">
          <label for="man">男</label>
          <label><input type="radio" name="gender">女</label><br>

    <!-- 多选框依然可以使用checked属性来实现默认选择 -->
     多选:<input type="checkbox">前端
     <input type="checkbox">后端
     <input type="checkbox" checked>全栈<br>
     <!-- 上传文件时，multiple属性可以实现一次性上传多个文件而不是只能选择一个 -->
     上传文件:<input type="file" multiple>


</body>
</html>
